services:
  fsw_barber_db:
    image: postgres:18-alpine
    container_name: fsw_barber_db
    ports:
      - ${DB_PORT}:5432
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - fsw_barber_pg_data:/var/lib/postgresql/data
    networks:
      - fsw_barber_db

networks:
  fsw_barber_db:
    driver: bridge

volumes:
  fsw_barber_pg_data:
